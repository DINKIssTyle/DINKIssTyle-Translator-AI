<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DKST Translator">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="DKST Translator AI">
    <meta name="theme-color" content="#2f7cf6">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <title>DKST Translator AI</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(47, 124, 246, 0.08), transparent 28%),
                linear-gradient(180deg, #fbfbfd 0%, #f1f3f8 100%);
        }

        body {
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #2a2d34;
        }

        #root {
            width: 100%;
            height: 100%;
            visibility: hidden;
        }

        body.app-ready #root {
            visibility: visible;
        }

        #app-splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background:
                radial-gradient(circle at top, rgba(47, 124, 246, 0.08), transparent 28%),
                linear-gradient(180deg, #fbfbfd 0%, #f1f3f8 100%);
            z-index: 9999;
            transition: opacity 0.2s ease;
        }

        body.app-ready #app-splash {
            opacity: 0;
            pointer-events: none;
        }

        .app-splash-mark {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: linear-gradient(180deg, #4d94ff 0%, #2f7cf6 100%);
            box-shadow: 0 14px 28px rgba(47, 124, 246, 0.18);
        }

        .app-splash-title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .app-splash-subtitle {
            font-size: 13px;
            color: #707784;
        }
    </style>
</head>
<body>
<div id="app-splash" aria-hidden="true">
    <div class="app-splash-mark"></div>
    <div class="app-splash-title">DKST Translator AI</div>
    <div class="app-splash-subtitle">Preparing workspace...</div>
</div>
<div id="root"></div>
<script src="./src/main.tsx" type="module"></script>
</body>
</html>
